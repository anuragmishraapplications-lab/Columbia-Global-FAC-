<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CGC FAC Tenure Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f4f6f9;
    --white: #ffffff;
    --surface: #ffffff;
    --surface2: #eef2f7;
    --border: #d0dae8;
    --border-light: #e5ecf5;
    --text: #1a2740;
    --text-secondary: #4a5f7a;
    --muted: #7a90ab;
    --columbia-blue: #75aadb;
    --columbia-blue-dark: #4a87c2;
    --columbia-blue-deep: #1d4f8c;
    --columbia-navy: #0f2d5e;
    --columbia-light: #ddeaf7;
    --accent-gold: #c4a44a;
    --red: #c0392b;
    --orange: #d4681a;
    --yellow: #b8920e;
    --green: #1e7e4e;
    --red-bg: #fdf0ee;
    --orange-bg: #fdf4ec;
    --yellow-bg: #fdfaec;
    --green-bg: #edf7f2;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(15,45,94,0.08), 0 4px 16px rgba(15,45,94,0.05);
    --shadow-sm: 0 1px 3px rgba(15,45,94,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: var(--columbia-navy);
    border-bottom: 3px solid var(--columbia-blue);
    padding: 0 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(15,45,94,0.18);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    padding: 14px 0;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-img {
    height: 60px;
    width: 60px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid rgba(117,170,219,0.4);
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .logo-text p {
    color: var(--columbia-blue);
    font-size: 11px;
    margin-top: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .header-divider {
    width: 1px;
    height: 40px;
    background: rgba(117,170,219,0.3);
    flex-shrink: 0;
  }
  .header-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(117,170,219,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
    min-width: 80px;
    transition: background 0.2s;
  }
  .stat-pill:hover { background: rgba(255,255,255,0.12); }
  .stat-pill .num {
    font-family: 'Source Serif 4', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }
  .stat-pill .label {
    font-size: 10px;
    color: var(--columbia-blue);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
    font-weight: 600;
  }
  .stat-pill.critical .num { color: #f4a59a; }
  .stat-pill.warning .num { color: #f5c88a; }
  .stat-pill.watch .num { color: #f5e08a; }

  /* CONTROLS */
  .controls {
    padding: 14px 36px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
    box-shadow: var(--shadow-sm);
  }
  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .ctrl-group label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    font-weight: 600;
  }
  select, input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 155px;
  }
  select:focus, input[type=text]:focus {
    border-color: var(--columbia-blue-dark);
    box-shadow: 0 0 0 3px rgba(74,135,194,0.15);
  }
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 32px; min-width: 210px; }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }
  .btn-add {
    margin-left: auto;
    background: var(--columbia-blue-deep);
    color: #ffffff;
    border: none;
    border-radius: 7px;
    padding: 8px 20px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(29,79,140,0.2);
  }
  .btn-add:hover {
    background: var(--columbia-navy);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(29,79,140,0.25);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 36px;
    background: var(--white);
    border-bottom: 2px solid var(--border-light);
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    font-weight: 500;
    white-space: nowrap;
  }
  .tab:hover { color: var(--columbia-blue-dark); }
  .tab.active { color: var(--columbia-blue-deep); border-bottom-color: var(--columbia-blue-deep); font-weight: 600; }
  .tab-badge {
    display: inline-block;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 5px;
    color: var(--muted);
    border: 1px solid var(--border-light);
  }
  .tab.active .tab-badge {
    background: var(--columbia-light);
    color: var(--columbia-blue-deep);
    border-color: var(--columbia-blue);
  }

  /* MAIN */
  .main { padding: 22px 36px; }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--white);
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: var(--columbia-navy);
  }
  th {
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--columbia-blue);
    font-weight: 600;
    border-bottom: 1px solid rgba(117,170,219,0.2);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  th:hover { color: #fff; }
  th.sorted { color: #fff; }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f6fc; }
  td { padding: 11px 14px; vertical-align: middle; }
  .td-name { font-weight: 600; color: var(--columbia-blue-deep); cursor: pointer; }
  .td-name:hover { text-decoration: underline; }
  .td-role {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .td-role.chair {
    background: rgba(196,164,74,0.12);
    color: #8a6e1a;
    border: 1px solid rgba(196,164,74,0.3);
  }
  .td-role.member {
    background: var(--columbia-light);
    color: var(--columbia-blue-deep);
    border: 1px solid rgba(74,135,194,0.25);
  }
  .td-cgc { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .td-school { color: var(--muted); font-size: 12px; max-width: 170px; }
  .td-date { font-variant-numeric: tabular-nums; white-space: nowrap; font-size: 13px; color: var(--text-secondary); }

  .urgency-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .urgency-badge::before { content: '●'; font-size: 7px; }
  .urgency-badge.expired {
    background: var(--red-bg);
    color: var(--red);
    border-color: rgba(192,57,43,0.2);
  }
  .urgency-badge.critical {
    background: var(--red-bg);
    color: var(--red);
    border-color: rgba(192,57,43,0.15);
  }
  .urgency-badge.warning {
    background: var(--orange-bg);
    color: var(--orange);
    border-color: rgba(212,104,26,0.15);
  }
  .urgency-badge.watch {
    background: var(--yellow-bg);
    color: var(--yellow);
    border-color: rgba(184,146,14,0.15);
  }
  .urgency-badge.ok {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(30,126,78,0.15);
  }
  .urgency-badge.none {
    background: var(--surface2);
    color: var(--muted);
    border-color: var(--border-light);
  }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Source Sans 3', sans-serif;
    transition: all 0.18s;
    margin-left: 3px;
  }
  .action-btn:hover { border-color: var(--columbia-blue-dark); color: var(--columbia-blue-deep); background: var(--columbia-light); }
  .action-btn.delete:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .no-results { padding: 60px 20px; text-align: center; color: var(--muted); background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); }
  .no-results span { font-size: 32px; display: block; margin-bottom: 10px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,45,94,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(15,45,94,0.18);
  }
  .modal h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 20px;
    color: var(--columbia-navy);
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--columbia-light);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .form-field input, .form-field select, .form-field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    outline: none;
    min-width: unset;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-field textarea { resize: vertical; min-height: 70px; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    border-color: var(--columbia-blue-dark);
    box-shadow: 0 0 0 3px rgba(74,135,194,0.12);
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border-light); }
  .btn-save {
    background: var(--columbia-blue-deep);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 9px 22px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 6px rgba(29,79,140,0.2);
  }
  .btn-save:hover { background: var(--columbia-navy); box-shadow: 0 4px 12px rgba(29,79,140,0.25); }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 7px;
    padding: 9px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--red); color: var(--red); }

  /* DETAIL PANEL */
  .detail-overlay {
    position: fixed; inset: 0;
    background: rgba(15,45,94,0.45);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .detail-overlay.hidden { display: none; }
  .detail-panel {
    background: var(--white);
    border-left: 3px solid var(--columbia-blue);
    width: 390px;
    max-width: 100vw;
    height: 100%;
    overflow-y: auto;
    padding: 28px;
    animation: slideIn 0.2s ease;
    box-shadow: -4px 0 20px rgba(15,45,94,0.12);
  }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .detail-header { background: var(--columbia-navy); margin: -28px -28px 0; padding: 20px 24px; border-bottom: 2px solid var(--columbia-blue); }
  .detail-close {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(117,170,219,0.3);
    color: var(--columbia-blue);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Source Sans 3', sans-serif;
    float: right;
    transition: all 0.2s;
  }
  .detail-close:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .detail-name {
    font-family: 'Source Serif 4', serif;
    font-size: 20px;
    color: #fff;
    margin-top: 10px;
    clear: both;
    line-height: 1.3;
  }
  .detail-role-cgc { display: flex; gap: 8px; align-items: center; margin: 10px 0 0; }
  .detail-body { padding-top: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 700;
  }
  .detail-section p { font-size: 13px; color: var(--text); line-height: 1.6; }
  .detail-section a { color: var(--columbia-blue-dark); text-decoration: none; }
  .detail-section a:hover { text-decoration: underline; }
  .detail-divider { border: none; border-top: 1px solid var(--border-light); margin: 16px 0; }
  .tenure-bar {
    background: var(--surface2);
    border-radius: 4px;
    height: 7px;
    margin-top: 8px;
    overflow: hidden;
    border: 1px solid var(--border-light);
  }
  .tenure-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header, .controls, .main { padding-left: 16px; padding-right: 16px; }
    .tabs { padding: 0 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .detail-panel { width: 100%; }
    .header-stats { gap: 8px; }
  }
</style>
</head>

const STORAGE_KEY = 'cgc_fac_v3';
let members = [];
let sortField = 'termEnd';
let sortAsc = true;
let activeTab = 'all';
let editingIndex = null;

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    members = saved ? JSON.parse(saved) : RAW_DATA.map((m,i)=>({...m,id:i}));
    if (!saved) saveData();
  } catch(e) { members = RAW_DATA.map((m,i)=>({...m,id:i})); }
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(members)); } catch(e) {} }
function today() { return new Date(); }
function daysLeft(termEnd) {
  if (!termEnd) return null;
  return Math.round((new Date(termEnd) - today()) / 86400000);
}
function getUrgency(termEnd) {
  const d = daysLeft(termEnd);
  if (d === null) return 'none';
  if (d < 0) return 'expired';
  if (d <= 30) return 'critical';
  if (d <= 90) return 'warning';
  if (d <= 180) return 'watch';
  return 'ok';
}
function urgencyLabel(termEnd) {
  const d = daysLeft(termEnd);
  if (d === null) return ['none', 'No date'];
  if (d < 0) return ['expired', `Expired ${Math.abs(d)}d ago`];
  if (d === 0) return ['critical', 'Expires today'];
  if (d <= 30) return ['critical', `${d}d left`];
  if (d <= 90) return ['warning', `${d}d left`];
  if (d <= 180) return ['watch', `${d}d left`];
  return ['ok', `${d}d left`];
}
function formatDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function filterMembers() {
  const cgc = document.getElementById('filterCGC').value;
  const role = document.getElementById('filterRole').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  const window_ = document.getElementById('filterWindow').value;
  return members.filter(m => {
    if (cgc && m.cgc !== cgc) return false;
    if (role && m.role !== role) return false;
    if (search && !`${m.name} ${m.school} ${m.email} ${m.title} ${m.cgc}`.toLowerCase().includes(search)) return false;
    const d = daysLeft(m.termEnd);
    if (activeTab === 'expired') return d !== null && d < 0;
    if (activeTab === '1') return d !== null && d >= 0 && d <= 30;
    if (activeTab === '3') return d !== null && d >= 0 && d <= 90;
    if (activeTab === '6') return d !== null && d >= 0 && d <= 180;
    if (activeTab === 'all') {
      if (window_ === 'expired') return d !== null && d < 0;
      if (window_ === 'all') return true;
      const days = parseInt(window_) * 30;
      return d !== null && d >= 0 && d <= days;
    }
    return true;
  });
}

function sortMembers(list) {
  const f = document.getElementById('sortBy').value || sortField;
  return [...list].sort((a, b) => {
    let va, vb;
    if (f === 'daysLeft') { va = daysLeft(a.termEnd) ?? 9999999; vb = daysLeft(b.termEnd) ?? 9999999; }
    else if (f === 'termEnd') { va = a.termEnd || 'zzz'; vb = b.termEnd || 'zzz'; }
    else if (f === 'termStart') { va = a.termStart || 'zzz'; vb = b.termStart || 'zzz'; }
    else { va = (a[f]||'').toLowerCase(); vb = (b[f]||'').toLowerCase(); }
    return va < vb ? (sortAsc?-1:1) : va > vb ? (sortAsc?1:-1) : 0;
  });
}

function toggleSort(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  document.getElementById('sortBy').value = field;
  render();
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

function updateBadges() {
  document.getElementById('badge-all').textContent = members.length;
  document.getElementById('badge-expired').textContent = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d<0; }).length;
  document.getElementById('badge-1').textContent = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d>=0&&d<=30; }).length;
  document.getElementById('badge-3').textContent = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d>=0&&d<=90; }).length;
  document.getElementById('badge-6').textContent = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d>=0&&d<=180; }).length;
}

function updateHeaderStats() {
  const expired = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d<0; }).length;
  const crit = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d>=0&&d<=30; }).length;
  const warn = members.filter(m => { const d=daysLeft(m.termEnd); return d!==null&&d>=0&&d<=90; }).length;
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill total"><div class="num">${members.length}</div><div class="label">Total</div></div>
    <div class="stat-pill critical"><div class="num">${expired}</div><div class="label">Expired</div></div>
    <div class="stat-pill warning"><div class="num">${crit}</div><div class="label">≤ 1 Month</div></div>
    <div class="stat-pill watch"><div class="num">${warn}</div><div class="label">≤ 3 Months</div></div>
  `;
}

function render() {
  updateBadges();
  updateHeaderStats();
  const filtered = sortMembers(filterMembers());
  const tbody = document.getElementById('tableBody');
  const noResults = document.getElementById('noResults');
  const tableWrap = document.getElementById('tableWrap');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    tableWrap.style.display = 'none';
    noResults.classList.remove('hidden');
    return;
  }
  tableWrap.style.display = '';
  noResults.classList.add('hidden');
  tbody.innerHTML = filtered.map(m => {
    const [uClass, uLabel] = urgencyLabel(m.termEnd);
    const idx = members.indexOf(m);
    const school = m.school.length > 28 ? m.school.substring(0,28)+'…' : m.school;
    return `<tr>
      <td class="td-name" onclick="openDetail(${idx})">${m.name}</td>
      <td class="td-cgc">${m.cgc}</td>
      <td><span class="td-role ${m.role.toLowerCase()}">${m.role}</span></td>
      <td class="td-school" title="${m.school}">${school}</td>
      <td class="td-date">${formatDate(m.termStart)}</td>
      <td class="td-date">${formatDate(m.termEnd)}</td>
      <td style="color:var(--muted);font-size:12px">${m.termLength||'—'}</td>
      <td><span class="urgency-badge ${uClass}">${uLabel}</span></td>
      <td>
        <button class="action-btn" onclick="openModal(${idx})">Edit</button>
        <button class="action-btn delete" onclick="deleteMember(${idx})">×</button>
      </td>
    </tr>`;
  }).join('');
}

function populateCGCFilter() {
  const cgcs = [...new Set(members.map(m=>m.cgc))].sort();
  const sel = document.getElementById('filterCGC');
  cgcs.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
}

function openModal(idx=null) {
  editingIndex = idx;
  const m = idx !== null ? members[idx] : null;
  document.getElementById('modalTitle').textContent = m ? 'Edit FAC Member' : 'Add FAC Member';
  document.getElementById('f-first').value = m ? m.name.split(' ')[0] : '';
  document.getElementById('f-last').value = m ? m.name.split(' ').slice(1).join(' ') : '';
  document.getElementById('f-cgc').value = m ? m.cgc : '';
  document.getElementById('f-role').value = m ? m.role : 'Member';
  document.getElementById('f-email').value = m ? m.email : '';
  document.getElementById('f-school').value = m ? m.school : '';
  document.getElementById('f-title').value = m ? m.title : '';
  document.getElementById('f-termStart').value = m ? (m.termStart||''): '';
  document.getElementById('f-termEnd').value = m ? (m.termEnd||''): '';
  document.getElementById('f-termLength').value = m ? (m.termLength||''): '';
  document.getElementById('f-notes').value = m ? m.notes : '';
  document.getElementById('f-poc').value = m ? m.poc : '';
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

function saveMember() {
  const first = document.getElementById('f-first').value.trim();
  const last = document.getElementById('f-last').value.trim();
  const cgc = document.getElementById('f-cgc').value;
  if (!first||!last||!cgc) { alert('Name and CGC Centre are required.'); return; }
  const member = {
    id: editingIndex !== null ? members[editingIndex].id : Date.now(),
    cgc, role: document.getElementById('f-role').value,
    name: `${first} ${last}`,
    email: document.getElementById('f-email').value.trim(),
    title: document.getElementById('f-title').value.trim(),
    school: document.getElementById('f-school').value.trim(),
    termStart: document.getElementById('f-termStart').value || null,
    termEnd: document.getElementById('f-termEnd').value || null,
    termLength: document.getElementById('f-termLength').value,
    notes: document.getElementById('f-notes').value.trim(),
    poc: document.getElementById('f-poc').value.trim(),
  };
  if (editingIndex !== null) members[editingIndex] = member;
  else members.push(member);
  saveData(); closeModal(); render();
}

function deleteMember(idx) {
  if (!confirm(`Remove ${members[idx].name}?`)) return;
  members.splice(idx, 1); saveData(); render();
}

function openDetail(idx) {
  const m = members[idx];
  const [uClass, uLabel] = urgencyLabel(m.termEnd);
  let pct = 0;
  if (m.termStart && m.termEnd) {
    const total = new Date(m.termEnd) - new Date(m.termStart);
    pct = Math.min(100, Math.max(0, Math.round(((today()-new Date(m.termStart))/total)*100)));
  }
  const barColor = {expired:'var(--red)',critical:'var(--orange)',warning:'var(--yellow)',ok:'var(--green)',watch:'var(--columbia-blue-dark)'}[uClass] || 'var(--muted)';
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <button class="detail-close" onclick="document.getElementById('detailOverlay').classList.add('hidden')">✕ Close</button>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--columbia-blue);font-weight:600;margin-bottom:6px">CGC ${m.cgc}</div>
      <div class="detail-name">${m.name}</div>
      <div class="detail-role-cgc" style="margin-top:10px">
        <span class="td-role ${m.role.toLowerCase()}">${m.role}</span>
        <span class="urgency-badge ${uClass}" style="border-color:rgba(255,255,255,0.2)">${uLabel}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h4>Academic Title</h4>
        <p>${m.title||'—'}</p>
      </div>
      <div class="detail-section">
        <h4>School / Department</h4>
        <p>${m.school||'—'}</p>
      </div>
      <div class="detail-section">
        <h4>Email</h4>
        <p>${m.email ? `<a href="mailto:${m.email}">${m.email}</a>` : '—'}</p>
      </div>
      <hr class="detail-divider"/>
      <div class="detail-section">
        <h4>FAC Term</h4>
        <p style="font-weight:600">${formatDate(m.termStart)} → ${formatDate(m.termEnd)}</p>
        <p style="color:var(--muted);font-size:12px;margin-top:2px">Duration: ${m.termLength||'Unknown'}</p>
        <div class="tenure-bar"><div class="tenure-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <p style="font-size:11px;color:var(--muted);margin-top:5px">${pct}% of term elapsed</p>
      </div>
      ${m.notes ? `<div class="detail-section"><h4>Notes</h4><p>${m.notes}</p></div>` : ''}
      ${m.poc ? `<div class="detail-section"><h4>Point of Contact</h4><p style="font-size:12px">${m.poc}</p></div>` : ''}
      <hr class="detail-divider"/>
      <button class="action-btn" style="width:100%;text-align:center;padding:9px;font-size:13px" onclick="document.getElementById('detailOverlay').classList.add('hidden');openModal(${idx})">✏ Edit this Member</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.remove('hidden');
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').classList.add('hidden');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

loadData();
populateCGCFilter();
render();
</script>
</body>
</html>
